name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: msi,nsis
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
          - name: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg
          - name: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,rpm,appimage

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Set macOS product name
        if: runner.os == 'macOS'
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf-8'));
            c.productName = 'Firefiles Launcher';
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "

      - name: Setup Windows ARM64 MSVC tools
        if: matrix.target == 'aarch64-pc-windows-msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg staging/
          elif [ "${{ runner.os }}" = "Windows" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle -type f | while read f; do
              cp "$f" staging/
            done
          else
            find src-tauri/target/${{ matrix.target }}/release/bundle -type f | while read f; do
              cp "$f" staging/
            done
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firefile_launcher_${{ matrix.name }}
          path: staging/*
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f | while read f; do
            cp "$f" release-assets/
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: true
